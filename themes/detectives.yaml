# A classic whodunit. Four categories, four items each, no ordered category.
name: "The Vanished Heirloom"
description: >-
  A priceless heirloom has gone missing from the manor. Four detectives each
  questioned a different suspect, in a different room, about a different object.
  Use the clues to work out who did what.
entity_noun: case

categories:
  - name: Detective
    items: [Holmes, Marple, Poirot, Spade]
  - name: Suspect
    items: [Butler, Cousin, Gardener, Maid]
  - name: Room
    items: [Library, Study, Cellar, Attic]
  - name: Object
    items: [Locket, Painting, Ledger, Brooch]
