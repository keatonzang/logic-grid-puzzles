# A small 3-category x 4-item theme for exercising the "one of N" clue rules
# (either/or, one-of-three) and neither/nor. No ordered category.
name: "The Morning Rush"
description: >-
  Four regulars each ordered a different drink and a different pastry one busy
  morning at the corner cafe. Work out who had what.
entity_noun: order

categories:
  - name: Customer
    items: [Ava, Ben, Cara, Dane]
  - name: Drink
    items: [Latte, Mocha, Cortado, Chai]
  - name: Pastry
    items: [Scone, Bagel, Muffin, Donut]
